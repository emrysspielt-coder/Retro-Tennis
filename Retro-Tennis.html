<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Retro Tennis PC Edition (Balanced Power-Ups)</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }
        .canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            border: 4px solid white;
            background-color: #000;
            display: block;
        }
        .controls-info {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
            background: #333;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #444;
        }
        .key {
            background: #555;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            border-bottom: 2px solid #111;
        }
    </style>
</head>
<body>

    <h1>Retro Tennis PC Edition</h1>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
    
    <div class="controls-info">
        <strong>Steuerung:</strong> <br>
        Spieler 1 (Links): <span class="key">W</span> Hoch | <span class="key">S</span> Runter <br>
        Spieler 2 (Rechts / KI): <span class="key">▲</span> Hoch | <span class="key">▼</span> Runter <br>
        <span style="font-size: 12px; color: #888; margin-top: 5px; display: block;">
            Im Hauptmenü mit der Maus klicken. Nach "Game Over" mit <span class="key">Leertaste</span> neu starten.
        </span>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- SOUND ENGINE ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === "hit") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } 
            else if (type === "wall") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(220, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.06);
                osc.start(now); osc.stop(now + 0.06);
            } 
            else if (type === "score") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } 
            else if (type === "beep") {
                osc.type = "square";
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            }
            else if (type === "powerup") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
            else if (type === "gameover") {
                osc.type = "square";
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.15);
                osc.frequency.setValueAtTime(783.99, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // --- SPIEL-KONFIGURATION ---
        const GAME_DURATION = 60; 
        let timeLeft = GAME_DURATION;
        
        let currentPhase = "MODE_SELECT"; 
        let isCountingDown = false; 
        let countdownValue = 3;
        let gameOver = false;
        
        let gameMode = "Computer"; 
        let currentDifficulty = "Normal"; 
        
        let timerInterval;
        let countdownInterval;
        let powerUpSpawnInterval;

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speedX: 5,
            speedY: 5,
            lastHitBy: null 
        };

        const paddleWidth = 12;
        const basePaddleHeight = 100;

        // Freeze-Konfigurationen (BALANCING)
        const FREEZE_DURATION = 1800; // Jetzt nur noch 1,8 Sekunden statt 3,5s
        const FREEZE_BLINK_START = 1200; // Nach 1,2 Sekunden fängt das Eis an zu tauen (Blink-Effekt)

        const player1 = {
            x: 20,
            y: canvas.height / 2 - basePaddleHeight / 2,
            width: paddleWidth,
            height: basePaddleHeight,
            score: 0,
            speed: 7,
            isFrozen: false,
            freezeTime: 0
        };

        const player2 = {
            x: canvas.width - 20 - paddleWidth,
            y: canvas.height / 2 - basePaddleHeight / 2,
            width: paddleWidth,
            height: basePaddleHeight,
            score: 0,
            speed: 7, 
            buffer: 15,
            isFrozen: false,
            freezeTime: 0
        };

        const powerUpTypes = ["GROW", "SPEED", "FREEZE"];
        let activePowerUps = []; 
        const MAX_POWERUPS = 3; 
        const POWERUP_LIFETIME = 8000; 

        const modeButtons = {
            vsComputer: { x: 150, y: 240, w: 220, h: 60, color: "#00ff00", label: "GEGEN COMPUTER" },
            vsPlayer:   { x: 430, y: 240, w: 220, h: 60, color: "#00bfff", label: "2 SPIELER (PC)" }
        };

        const diffButtons = {
            leicht:  { x: 160, y: 240, w: 140, h: 50, color: "#00ff00", label: "LEICHT" },
            normal:  { x: 330, y: 240, w: 140, h: 50, color: "#ffcc00", label: "NORMAL" },
            schwer:  { x: 500, y: 240, w: 140, h: 50, color: "#ff3333", label: "SCHWER" }
        };

        const keys = {};
        window.addEventListener("keydown", (e) => { 
            keys[e.key.toLowerCase()] = true; 
            keys[e.key] = true; // Für Richtungstasten wie ArrowUp
            if (gameOver && e.key === " ") {
                initAudio();
                prepareNewGame();
            }
        });
        window.addEventListener("keyup", (e) => { 
            keys[e.key.toLowerCase()] = false; 
            keys[e.key] = false;
        });

        canvas.addEventListener("mousedown", function(e) {
            initAudio();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (gameOver) {
                prepareNewGame();
                return;
            }

            if (currentPhase === "MODE_SELECT") {
                if (isInside(mouseX, mouseY, modeButtons.vsComputer)) {
                    playSound("beep"); gameMode = "Computer"; currentPhase = "DIFFICULTY_SELECT";
                } else if (isInside(mouseX, mouseY, modeButtons.vsPlayer)) {
                    gameMode = "Mensch"; player2.speed = 7; startCountdown();
                }
            } 
            else if (currentPhase === "DIFFICULTY_SELECT" && !isCountingDown) {
                if (isInside(mouseX, mouseY, diffButtons.leicht)) { setDifficulty("Leicht"); startCountdown(); }
                else if (isInside(mouseX, mouseY, diffButtons.normal)) { setDifficulty("Normal"); startCountdown(); }
                else if (isInside(mouseX, mouseY, diffButtons.schwer)) { setDifficulty("Schwer"); startCountdown(); }
            }
        });

        function isInside(x, y, btn) {
            return x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            if (diff === "Leicht") { player2.speed = 4.0; player2.buffer = 30; } 
            else if (diff === "Normal") { player2.speed = 5.5; player2.buffer = 15; } 
            else if (diff === "Schwer") { player2.speed = 7.5; player2.buffer = 5; }
        }

        function startCountdown() {
            currentPhase = "PLAYING"; isCountingDown = true; countdownValue = 3;
            resetBallPosition(); activePowerUps = []; playSound("beep");

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdownValue--;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval); isCountingDown = false; 
                    playSound("hit"); startTimer(); startPowerUpSpawner();
                } else {
                    playSound("beep");
                }
            }, 1000);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameOver && !isCountingDown) {
                    timeLeft--;
                    if (timeLeft <= 3 && timeLeft > 0) playSound("beep");
                    if (timeLeft <= 0) {
                        timeLeft = 0; gameOver = true;
                        clearInterval(powerUpSpawnInterval); playSound("gameover");
                    }
                }
            }, 1000);
        }

        function startPowerUpSpawner() {
            clearInterval(powerUpSpawnInterval);
            powerUpSpawnInterval = setInterval(() => {
                if (!gameOver && !isCountingDown && activePowerUps.length < MAX_POWERUPS) {
                    const randomType = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                    let color = "#00ff00"; 
                    if (randomType === "SPEED") color = "#ff3333";
                    if (randomType === "FREEZE") color = "#00bfff";

                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.2; 

                    activePowerUps.push({
                        x: Math.random() * (canvas.width - 340) + 170, 
                        y: Math.random() * (canvas.height - 100) + 50,
                        radius: 15, type: randomType, color: color,
                        speedX: Math.cos(angle) * speed, speedY: Math.sin(angle) * speed,
                        spawnTime: Date.now(), isDespawning: false
                    });
                }
            }, 5000); 
        }

        function applyPowerUp(type, scoringPlayer) {
            playSound("powerup");
            const target = scoringPlayer === 1 ? player1 : player2;
            const opponent = scoringPlayer === 1 ? player2 : player1;

            if (type === "GROW") {
                target.height = basePaddleHeight * 1.7; // Leicht entschärft von 2.0 auf 1.7
                setTimeout(() => { target.height = basePaddleHeight; }, 8000); 
            } 
            else if (type === "SPEED") {
                ball.speedX *= 1.4; ball.speedY *= 1.4;
            } 
            else if (type === "FREEZE") {
                opponent.isFrozen = true; 
                opponent.freezeTime = Date.now();
                
                setTimeout(() => { 
                    opponent.isFrozen = false; 
                }, FREEZE_DURATION); 
            }
        }

        function prepareNewGame() {
            player1.score = 0; player2.score = 0;
            player1.height = basePaddleHeight; player2.height = basePaddleHeight;
            player1.isFrozen = false; player2.isFrozen = false;
            timeLeft = GAME_DURATION; gameOver = false; activePowerUps = [];
            clearInterval(powerUpSpawnInterval); currentPhase = "MODE_SELECT"; 
        }

        function resetBallPosition() {
            ball.x = canvas.width / 2; ball.y = canvas.height / 2; ball.lastHitBy = null;
        }

        function resetBall() {
            resetBallPosition();
            let baseSpeed = 5;
            ball.speedX = ball.speedX > 0 ? -baseSpeed : baseSpeed;
            ball.speedY = (Math.random() > 0.5 ? 1 : -1) * baseSpeed;
        }

        function update() {
            if (currentPhase !== "PLAYING" || isCountingDown || gameOver) return;

            // Spieler 1 Steuerung (W / S)
            if (!player1.isFrozen) {
                if (keys["w"]) player1.y = Math.max(player1.y - player1.speed, 0);
                if (keys["s"]) player1.y = Math.min(player1.y + player1.speed, canvas.height - player1.height);
            }

            // Spieler 2 Steuerung (Pfeiltasten oder KI)
            if (!player2.isFrozen) {
                if (gameMode === "Mensch") {
                    if (keys["ArrowUp"]) player2.y = Math.max(player2.y - player2.speed, 0);
                    if (keys["ArrowDown"]) player2.y = Math.min(player2.y + player2.speed, canvas.height - player2.height);
                } else {
                    const computerPaddleCenter = player2.y + player2.height / 2;
                    if (ball.speedX > 0 || currentDifficulty === "Schwer") {
                        if (ball.y < computerPaddleCenter - player2.buffer) player2.y = Math.max(player2.y - player2.speed, 0);
                        else if (ball.y > computerPaddleCenter + player2.buffer) player2.y = Math.min(player2.y + player2.speed, canvas.height - player2.height);
                    }
                }
            }

            ball.x += ball.speedX; ball.y += ball.speedY;

            // Power-Up Logik
            const now = Date.now();
            for (let i = activePowerUps.length - 1; i >= 0; i--) {
                let pu = activePowerUps[i]; let age = now - pu.spawnTime;
                if (age > POWERUP_LIFETIME - 500) pu.isDespawning = true;
                if (age >= POWERUP_LIFETIME) { activePowerUps.splice(i, 1); continue; }

                pu.x += pu.speedX; pu.y += pu.speedY;
                if (pu.y - pu.radius < 0 || pu.y + pu.radius > canvas.height) pu.speedY = -pu.speedY;
                if (pu.x - pu.radius < 120 || pu.x + pu.radius > canvas.width - 120) pu.speedX = -pu.speedX;

                let dx = ball.x - pu.x; let dy = ball.y - pu.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < ball.radius + pu.radius) {
                    if (ball.lastHitBy !== null) applyPowerUp(pu.type, ball.lastHitBy);
                    activePowerUps.splice(i, 1);
                }
            }

            // Wandkollision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) { ball.speedY = -ball.speedY; playSound("wall"); }

            // Schlägerkollision
            if (ball.x - ball.radius < player1.x + player1.width && ball.x + ball.radius > player1.x && ball.y > player1.y && ball.y < player1.y + player1.height) {
                ball.speedX = Math.abs(ball.speedX) * 1.03; ball.lastHitBy = 1; playSound("hit");
                ball.x = player1.x + player1.width + ball.radius; // Verhindert Feststecken
            }
            if (ball.x + ball.radius > player2.x && ball.x - ball.radius < player2.x + player2.width && ball.y > player2.y && ball.y < player2.y + player2.height) {
                ball.speedX = -Math.abs(ball.speedX) * 1.03; ball.lastHitBy = 2; playSound("hit");
                ball.x = player2.x - ball.radius; // Verhindert Feststecken
            }

            // Punkte erzielen
            if (ball.x < 0) { player2.score++; playSound("score"); resetBall(); } 
            else if (ball.x > canvas.width) { player1.score++; playSound("score"); resetBall(); }
        }

        function getPaddleColor(player) {
            if (!player.isFrozen) return "#fff";
            
            const elapsed = Date.now() - player.freezeTime;
            // Wenn das Power-Up fast abgelaufen ist (Blinkphase), blinke hellblau/weiß
            if (elapsed > FREEZE_BLINK_START) {
                return Math.floor(elapsed / 100) % 2 === 0 ? "#00bfff" : "#e0ffff";
            }
            return "#00bfff"; // Normales Eis-Blau am Anfang
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Mittellinie
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
            ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
            ctx.setLineDash([]); 

            // Schläger zeichnen (mit dynamischer Freeze-Farbe)
            ctx.fillStyle = getPaddleColor(player1); ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
            ctx.fillStyle = getPaddleColor(player2); ctx.fillRect(player2.x, player2.y, player2.width, player2.height);

            // Power-Ups zeichnen
            if (currentPhase === "PLAYING" && !isCountingDown && !gameOver) {
                const now = Date.now();
                activePowerUps.forEach(pu => {
                    ctx.save();
                    let currentRadius = pu.radius;
                    if (pu.isDespawning) {
                        let scale = Math.max(0, (POWERUP_LIFETIME - (now - pu.spawnTime)) / 500);
                        currentRadius *= scale; ctx.globalAlpha = scale;
                    }
                    if (currentRadius > 0) {
                        ctx.beginPath(); ctx.arc(pu.x, pu.y, currentRadius, 0, Math.PI * 2);
                        ctx.fillStyle = pu.color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke(); ctx.closePath();
                        ctx.fillStyle = "#000"; ctx.font = `bold ${Math.floor(currentRadius * 0.9)}px Arial`; ctx.textAlign = "center";
                        ctx.fillText("?", pu.x, pu.y + (currentRadius * 0.35));
                    }
                    ctx.restore();
                });
            }

            // Ball zeichnen
            if (currentPhase === "PLAYING" && !isCountingDown && !gameOver) {
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fillStyle = "#00ff00"; ctx.fill(); ctx.closePath();
            }

            // UI Texte (Scores & Timer)
            ctx.fillStyle = "#fff"; ctx.font = "32px Arial"; ctx.textAlign = "center";
            ctx.fillText(player1.score, canvas.width / 4, 50); ctx.fillText(player2.score, (canvas.width / 4) * 3, 50);
            
            ctx.font = "24px Arial"; ctx.fillStyle = timeLeft <= 10 ? "#ff0000" : "#fff"; ctx.fillText("Zeit: " + timeLeft + "s", canvas.width / 2, 40);
            
            if (currentPhase === "PLAYING" && !gameOver) {
                ctx.font = "14px Arial"; ctx.fillStyle = "#aaa";
                ctx.fillText(gameMode === "Mensch" ? "Modus: 2 Spieler" : `Modus: KI (${currentDifficulty})`, canvas.width / 2, 70);
            }

            // Modus Auswahl Menü
            if (currentPhase === "MODE_SELECT") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.font = "40px Arial"; ctx.fillText("RETRO TENNIS PC", canvas.width / 2, 130);
                ctx.font = "24px Arial"; ctx.fillStyle = "#aaa"; ctx.fillText("Wähle einen Spielmodus:", canvas.width / 2, 180);
                Object.values(modeButtons).forEach(btn => {
                    ctx.fillStyle = btn.color; ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                    ctx.fillStyle = "#000"; ctx.font = "bold 18px Arial"; ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + 36);
                });
            }

            // Schwierigkeitsgrad Auswahl Menü
            if (currentPhase === "DIFFICULTY_SELECT") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.font = "32px Arial"; ctx.fillText("Computer-Schwierigkeit:", canvas.width / 2, 160);
                Object.values(diffButtons).forEach(btn => {
                    ctx.fillStyle = btn.color; ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                    ctx.fillStyle = "#000"; ctx.font = "bold 18px Arial"; ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + 32);
                });
            }

            // Countdown vor dem Spielstart
            if (isCountingDown) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffcc00"; ctx.font = "bold 90px Arial"; ctx.fillText(countdownValue, canvas.width / 2, canvas.height / 2 + 30);
            }

            // Game Over Bildschirm
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.font = "44px Arial"; ctx.fillText("ZEIT ABGELAUFEN!", canvas.width / 2, canvas.height / 2 - 50);
                let winnerText = "Unentschieden!";
                if (player1.score > player2.score) winnerText = "Spieler 1 gewinnt!";
                else if (player2.score > player1.score) winnerText = gameMode === "Mensch" ? "Spieler 2 gewinnt!" : "Der Computer gewinnt!";
                
                ctx.fillStyle = "#00ff00"; ctx.font = "32px Arial"; ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2 + 10);
                ctx.font = "22px Arial"; ctx.fillStyle = "#aaa"; ctx.fillText("Drücke LEERTASTE oder klicke für das Hauptmenü", canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
